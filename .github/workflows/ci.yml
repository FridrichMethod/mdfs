name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    name: py ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv and install (CPU)
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          uv pip install -p .venv/bin/python -e ".[dev,mypy]"

      - name: Lint (ruff)
        run: |
          .venv/bin/ruff check src tests
          .venv/bin/ruff format --check src tests

      - name: Type check (mypy)
        run: .venv/bin/mypy src/mdfs

      - name: Security scan (bandit)
        run: .venv/bin/bandit -r src/mdfs -c pyproject.toml -q -ll

      - name: Tests (fast suite)
        run: .venv/bin/pytest -m "not slow and not gpu" --cov=src/mdfs --cov-report=term-missing
